<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="menu.css">
    <title>Edupage Extras</title>
  </head>
  <body>
    <main class="menu">
      <header class="menu-header">
        <h1>Edupage Extras</h1>
        <span class="menu-version">0.2.0</span>
      </header>

      <label class="toggle-row" for="DarkModeCheckbox">
        <span>
          <strong>Themes</strong>
          <small>Use Edupage Extras colors</small>
        </span>
        <input type="checkbox" id="DarkModeCheckbox">
      </label>

      <div class="button-stack">
        <button class="menu-button" id="SettingsButton" type="button">
          <span>Settings</span>
          <span aria-hidden="true">></span>
        </button>
      </div>

      <section class="update-notice" id="UpdateNotice" hidden>
        <strong>Update available</strong>
        <small id="UpdateNoticeText">Pull the latest project from GitHub.</small>
        <button class="menu-button" id="OpenUpdateButton" type="button">
          <span>Open GitHub</span>
          <span aria-hidden="true">></span>
        </button>
      </section>

      <footer class="made-by">
        Made by <a href="https://github.com/Alexosavrua" target="_blank" rel="noopener noreferrer">JustAlex</a>
      </footer>
    </main>
    <script src="menu.js"></script>
  </body>
</html>
