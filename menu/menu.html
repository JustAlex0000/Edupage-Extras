<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="menu.css">
    <title>Edupage Extras</title>
  </head>
  <body>
    <main class="menu">
      <header class="menu-header">
        <h1>Edupage Extras</h1>
        <span class="menu-version">0.2</span>
      </header>

      <label class="toggle-row" for="DarkModeCheckbox">
        <span>
          <strong>Dark Mode</strong>
          <small>Use the dark Edupage theme</small>
        </span>
        <input type="checkbox" id="DarkModeCheckbox">
      </label>

      <div class="button-stack">
        <button class="menu-button" id="SettingsButton" type="button">
          <span>Settings</span>
          <span aria-hidden="true">></span>
        </button>
      </div>
    </main>
    <script src="menu.js"></script>
  </body>
</html>
